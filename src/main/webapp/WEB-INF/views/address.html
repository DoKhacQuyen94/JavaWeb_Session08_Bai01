<!DOCTYPE html>
<html lang="vi" xmlns:th ="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Test Address Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .test-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        #responseLog { background: #2d2d2d; color: #00ff00; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; margin-top: 20px; min-height: 100px; white-space: pre-wrap; }
    </style>
</head>
<body>
<form action="/api/address/update" method="POST" class="card p-4">
    <div class="mb-3">
        <label>Tên người nhận:</label>
        <input type="text" name="receiverName" class="form-control">
    </div>

    <div class="mb-3">
        <label>Địa chỉ chi tiết:</label>
        <input type="text" name="detailedAddress" class="form-control">
    </div>
    <button type="submit" class="btn btn-success w-100">Cập nhật ngay</button>
</form>
</body>
</html>
